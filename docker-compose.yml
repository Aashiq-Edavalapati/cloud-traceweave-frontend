version: '3.8'

services:
  # -----------------------------------------------------------------
  # 1. Core API - Node.js
  # -----------------------------------------------------------------
  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    container_name: traceweave-core
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgres://user:password@postgres:5432/traceweave
      - MONGO_URL=mongodb://mongo:27017/traceweave_history
    depends_on:
      - postgres
      - mongo
    volumes:
      - ./backend/core-api/src:/app/src # Hot Reload

  # -----------------------------------------------------------------
  # 2. Proxy - Python
  # -----------------------------------------------------------------
  proxy-service:
    build:
      context: ./backend/proxy-service
      dockerfile: Dockerfile
    container_name: traceweave-proxy
    ports:
      - "8080:8080"  # Proxy Port
      - "8081:8081"  # Web Interface
    volumes:
      - ./backend/proxy-service:/app

  # -----------------------------------------------------------------
  # 3. AI - Python
  # -----------------------------------------------------------------
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: traceweave-ai
    ports:
      - "5000:5000"
    volumes:
      - ./backend/ai-service:/app

  # -----------------------------------------------------------------
  # 4. API Gateway - Nginx
  # -----------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: traceweave-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-api
      - ai-service

  # -----------------------------------------------------------------
  # DATA LAYER
  # -----------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: traceweave-postgres
    ports:
      - "5431:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=traceweave
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  mongo:
    image: mongo:6
    container_name: traceweave-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: