events {
    worker_connections 1024;
}

http {
    upstream core_api {
        server core-api:4000;
    }

    upstream ai_service {
        server ai-service:5000;
    }

    server {
        listen 80;

        # Route /api/v1/analyze -> AI Service
        location /api/v1/analyze {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
        }

        # Route ALL other /api calls -> Core API
        location /api {
            proxy_pass http://core_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route / -> Frontend (If we dockerize frontend later, for now just API)
        location / {
            return 200 'TraceWeave Gateway Running';
        }
    }
}